<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Olivia's Picturebook</title>

        <!-- Links -->
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wdth,wght@80,400&display=swap" rel="stylesheet">
        <script src="playImages.js" defer></script>
        <script src="main.js" defer></script>
    </head>

    <body>
        <!-- Section for the upper left back button -->
        <section class="BackButtonLocation">
            <a href="index.html"
            class="ToTitle">
            Back to Title
            </a>
        </section>
        
        <!-- Upper half of screen image display section -->
        <section class="ImageLocation">
            <div id="difficultyButtons">
                <button type="button" id="easyButton">Easy</button>
                <button type="button" id="normalButton">Normal</button>
                <button type="button" id="hardButton">Hard</button>
            </div>
        </section>

        <!-- Bottom of page choice input section -->
        <section class="InputLocation">
            <table>
                <tbody>
                    <tr>
                        <td id="ChoiceOne"></td>
                        <td id="ChoiceTwo"></td>
                    </tr>
                    <tr>
                        <td id="ChoiceThree"></td>
                        <td id="ChoiceFour"></td>
                    </tr>
                </tbody>
            </table>
        </section>
    </body>
</html>
